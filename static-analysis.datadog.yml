schema-version: v1
rulesets:
  - javascript-best-practices
    rules:
      no-console-log:
        enabled: false
  - javascript-browser-security
  - javascript-common-security
  - javascript-express
  - javascript-inclusive
  - javascript-node-security:
    rules:
      detect-non-literal-fs-filename:
        ignore:
          - "**"
  - jsx-react
