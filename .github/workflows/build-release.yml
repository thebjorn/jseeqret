name: Build and Release

# Builds and tests the Electron app on every v* tag and uploads the
# (unsigned) installer as a workflow artifact. It deliberately does NOT
# create a GitHub release: CI cannot sign (no hardware token) and events
# from the default GITHUB_TOKEN would not trigger npm-publish.yml anyway.
# The release is created manually with `gh release create` (see
# PUBLISHING.md) using a PAT, which fires `release: created` and triggers
# the npm publish.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build Electron app
        run: pnpm build

      - name: Package Windows installer and portable
        run: pnpm exec electron-builder --win --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            dist/*.exe
            dist/*.yml
          retention-days: 30
